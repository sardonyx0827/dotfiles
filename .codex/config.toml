model = "gpt-5.3-codex"

model_reasoning_effort = "medium"
hide_agent_reasoning = true
network_access = true
personality = "pragmatic"
web_search = "live"

[features]
streamable_shell = true          # enable the streamable exec tool

[mcp_servers.playwright]
command = "npx"
args = [ "@playwright/mcp@latest" ]
