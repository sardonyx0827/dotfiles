# model: intentionally unset — inherit the Codex CLI's built-in default,
# which auto-tracks as the CLI updates (no version string to maintain here).
# Pin a tier (e.g. "gpt-5.6-terra") only to deliberately override the default.
model_reasoning_effort = "xhigh"

hide_agent_reasoning = true
network_access = true
personality = "pragmatic"
web_search = "live"

[agents]
max_threads = 6
max_depth = 1

[features]
streamable_shell = true
multi_agent = true
js_repl = false
