name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 最小権限: このワークフローはチェックアウトして検査するだけ
permissions:
  contents: read

# 同一 ref の古い実行はキャンセル。ただし main への push は
# 途中中断しない（開発ブランチの実行は最後まで通す）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    # 単一 OS (ubuntu) は意図的な選択。フックと install.sh は hermetic テストで、
    # OS 依存分岐は差し込み口 (例: DEBIAN_VERSION_FILE、OS 変数を強制する sourced
    # 関数テスト) 経由で host 非依存に検証している。macOS/Windows ランナーを足しても
    # 追加で得られる実カバレッジは小さく CI コスト/保守負荷に見合わないため採用せず、
    # macOS 実機での確認は手元の実行に委ねる。
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          # requirements ファイルは無いので、pip のバージョンピンを記述している
          # このワークフロー自体をキャッシュキーにする
          cache: pip
          cache-dependency-path: .github/workflows/ci.yml
      - name: Install test dependencies
        run: python -m pip install --upgrade pip "pytest==9.0.1" "pytest-cov==7.0.0"
      # .zshrc の構文検査 (zsh -n) に必要。未導入なら該当テストは skip される
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh
      # フックは stdin/subprocess/urlopen を全てスタブ化した hermetic テスト。
      # codex / gemini / tmux 等の実バイナリは不要（conftest.py 参照）。
      # Python フックは in-process で exec されるためカバレッジを実測でき、
      # 集計 90% を下回るとジョブが失敗する（設定は .coveragerc、実測は約 97%）。
      # 併せて JSON レポートを出力し、後続ステップでファイル単位の床も強制する。
      - name: Run pytest (with coverage gate)
        run: >-
          python -m pytest -q
          --cov=.claude/hooks
          --cov=.claude/mcp-servers
          --cov=.codex/hooks
          --cov=scripts
          --cov-report=term-missing
          --cov-report=json:coverage.json
          --cov-fail-under=90
      # .codex/agents/*.toml は .claude/agents/*.md から生成される成果物であり、
      # Codex CLI がビルド無しで読むためリポジトリにコミットしてある。手動編集や
      # SSOT 側だけの更新を弾く。生成器自身の --check を使うのは、`git diff` が
      # 未追跡ファイルや孤児 TOML を見逃すため（tests 側でも同じ検査をするが、
      # ここで独立に落とすことで失敗理由が CI ログ上で明示される）。
      - name: Check generated Codex agents are current
        run: python3 scripts/gen_codex_agents.py --check
      # 集計 90% ゲートはファイル単位の低カバレッジを平均で覆い隠すため、
      # 各ファイルに最低 80% を別途強制する（測定された全ファイルが対象。
      # 以前あった .coveragerc の omit は、対象だった .codex 側の複製が
      # symlink になり測定上 1 ファイルへ統合されたため不要になった）。
      - name: Enforce per-file coverage floor (80%)
        run: |
          python - <<'PY'
          import json
          import sys

          FLOOR = 80.0
          with open("coverage.json", encoding="utf-8") as fh:
              data = json.load(fh)

          failures = []
          for path, meta in sorted(data["files"].items()):
              pct = meta["summary"]["percent_covered"]
              print(f"{'OK ' if pct >= FLOOR else 'LOW'} {pct:6.2f}%  {path}")
              if pct < FLOOR:
                  failures.append((path, pct))

          if failures:
              print()
              for path, pct in failures:
                  print(f"::error::{path} coverage {pct:.2f}% is below the {FLOOR:.0f}% floor")
              sys.exit(1)

          print(f"\nAll measured files meet the {FLOOR:.0f}% per-file floor.")
          PY

  lint:
    name: ruff + bandit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: .github/workflows/ci.yml
      - name: Install linters
        run: python -m pip install --upgrade pip "ruff==0.15.6" "bandit==1.9.4" "mypy==1.19.1"
      # スコープは自作 Python のみ（.codex/skills/.system 配下の vendored スクリプトは除外）
      - name: ruff check
        run: ruff check .claude/hooks .claude/mcp-servers tests .codex/hooks scripts
      - name: ruff format --check
        run: ruff format --check .claude/hooks .claude/mcp-servers tests .codex/hooks scripts
      - name: bandit (security, medium+ severity)
        run: bandit -ll -q -r .claude/hooks .claude/mcp-servers tests .codex/hooks scripts
      # フックには元から型注釈が付いていたが検証する仕組みが無く、実装と注釈が
      # 無言で乖離し得た。設定ファイルは置かない: 既定値で緑になり、唯一の例外
      # (Windows 専用の任意依存 win10toast) は import 箇所の inline ignore で
      # 完結するため。設定を足すのは、それが実際に何かを検出するときだけにする。
      # 2 回に分けるのは .claude/hooks と .codex/hooks が同名モジュール
      # (bash-review.py / _bash_review_common.py) を持ち、両方を 1 回の呼び出しに
      # 渡すと mypy が重複モジュールとして実行を拒否するため。codex 側の
      # bash-review.py は別実体 (exit-2 変種) なので除外ではなく個別に検査する。
      # tests/ は対象外: conftest / フック本体を sys.path 操作で読むため mypy の
      # モジュール解決と噛み合わず、緑にするには実挙動と無関係なスタブ整備が
      # 要る。守れない厳しさを掲げるより、本番コードを確実に縛る方を採る。
      - name: mypy (type check)
        run: |
          mypy .claude/hooks .claude/mcp-servers scripts
          mypy .codex/hooks

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      # shellcheck は ubuntu-latest ランナーにプリインストール済み
      - name: Run shellcheck
        run: |
          shellcheck --version
          # 自作シェルスクリプトのみ検査（vendored な .codex/skills/.system 配下は除外）
          files=$(git ls-files '*.sh' | grep -v '^\.codex/skills/\.system/')
          echo "$files"
          # -x: source 先を追って検査する。フックは _hook_common.sh 等を sibling
          # として読み込むため、無いと SC1091 (Not following) で落ちる。
          # -P SCRIPTDIR: source 先をスクリプト自身のディレクトリ基準で探す
          # （実行時の cwd に依存させない）。
          # shellcheck disable=SC2086  # パスに空白は無いため意図的に単語分割する
          shellcheck -x -P SCRIPTDIR $files
