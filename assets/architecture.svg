<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 750" width="1240" height="750" font-family="'Helvetica Neue', Arial, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#6e6a86"/>
    </marker>
    <style>
      .mono { font-family: 'SF Mono', 'Menlo', 'Consolas', 'DejaVu Sans Mono', monospace; }
    </style>
  </defs>

  <!-- base background (must cover full canvas so light text survives on light themes) -->
  <rect x="0" y="0" width="1240" height="750" fill="#191724"/>
  <rect x="8" y="8" width="1224" height="734" rx="18" fill="none" stroke="#26233a" stroke-width="1.5"/>

  <!-- ============ HEADER ============ -->
  <text x="42" y="72" font-size="34" font-weight="700" fill="#c4a7e7">◆ dotfiles</text>
  <text x="44" y="102" font-size="15" fill="#908caa">Rosé Pine で統一した開発環境 — Shell · Editors · AI Dev Tools · CI</text>

  <!-- platform pills -->
  <text x="1198" y="44" font-size="11" fill="#6e6a86" text-anchor="end" class="mono">cross‑platform</text>
  <g class="mono" font-size="13" fill="#9ccfd8">
    <rect x="906" y="54" width="90" height="30" rx="15" fill="none" stroke="#403d52"/>
    <text x="951" y="74" text-anchor="middle">macOS</text>
    <rect x="1006" y="54" width="90" height="30" rx="15" fill="none" stroke="#403d52"/>
    <text x="1051" y="74" text-anchor="middle">Ubuntu</text>
    <rect x="1106" y="54" width="92" height="30" rx="15" fill="none" stroke="#403d52"/>
    <text x="1152" y="74" text-anchor="middle">WSL</text>
  </g>

  <!-- ============ ORCHESTRATOR ============ -->
  <rect x="40" y="150" width="1158" height="66" rx="12" fill="#1f1d2e" stroke="#403d52"/>
  <rect x="40" y="150" width="6" height="66" rx="3" fill="#ebbcba"/>
  <text x="66" y="178" font-size="18" font-weight="700" fill="#ebbcba" class="mono">install.sh</text>
  <text x="66" y="202" font-size="13" fill="#908caa" class="mono">detect platform → install packages → symlink → $HOME • register MCP • default shell = zsh</text>
  <text x="1178" y="178" font-size="12" fill="#6e6a86" text-anchor="end" class="mono">auto‑backup existing</text>

  <!-- arrows down to row A -->
  <line x1="225" y1="220" x2="225" y2="238" stroke="#6e6a86" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="619" y1="220" x2="619" y2="238" stroke="#6e6a86" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="1013" y1="220" x2="1013" y2="238" stroke="#6e6a86" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ============ ROW A ============ -->
  <!-- Card 1: Shell & Terminal (foam) -->
  <rect x="40" y="240" width="370" height="196" rx="14" fill="#1f1d2e" stroke="#403d52"/>
  <circle cx="64" cy="270" r="6" fill="#9ccfd8"/>
  <text x="82" y="276" font-size="17" font-weight="700" fill="#e0def4">Shell &amp; Terminal</text>
  <line x1="62" y1="292" x2="388" y2="292" stroke="#403d52"/>
  <g class="mono">
    <text x="64" y="326" font-size="14" fill="#e0def4">Zsh · Oh My Zsh · tmux · WezTerm</text>
    <text x="64" y="354" font-size="12.5" fill="#908caa">.zshrc · .tmux.conf · .wezterm.lua</text>
    <text x="64" y="382" font-size="12.5" fill="#908caa">px‑rose‑pine theme · nerd fonts</text>
  </g>

  <!-- Card 2: Editors (gold) -->
  <rect x="434" y="240" width="370" height="196" rx="14" fill="#1f1d2e" stroke="#403d52"/>
  <circle cx="458" cy="270" r="6" fill="#f6c177"/>
  <text x="476" y="276" font-size="17" font-weight="700" fill="#e0def4">Editors</text>
  <line x1="456" y1="292" x2="782" y2="292" stroke="#403d52"/>
  <g class="mono">
    <text x="458" y="326" font-size="14" fill="#e0def4">Neovim · Vim · VS Code</text>
    <text x="458" y="354" font-size="12.5" fill="#908caa">.config/nvim (lazy.nvim)</text>
    <text x="458" y="382" font-size="12.5" fill="#908caa">.vim/rc/*.vim · settings/keys</text>
  </g>

  <!-- Card 3: Quality & CI (pine) -->
  <rect x="828" y="240" width="370" height="196" rx="14" fill="#1f1d2e" stroke="#403d52"/>
  <circle cx="852" cy="270" r="6" fill="#31748f"/>
  <text x="870" y="276" font-size="17" font-weight="700" fill="#e0def4">Quality &amp; CI</text>
  <line x1="850" y1="292" x2="1176" y2="292" stroke="#403d52"/>
  <g class="mono">
    <text x="852" y="326" font-size="14" fill="#e0def4">pytest · ruff · bandit · shellcheck</text>
    <text x="852" y="354" font-size="12.5" fill="#908caa">15 test suites · 90% coverage gate</text>
    <text x="852" y="382" font-size="12.5" fill="#908caa">GitHub Actions CI</text>
  </g>

  <!-- ============ ROW B: AI Dev Tools (iris) ============ -->
  <rect x="40" y="460" width="1158" height="250" rx="14" fill="#1f1d2e" stroke="#403d52"/>
  <circle cx="64" cy="488" r="6" fill="#c4a7e7"/>
  <text x="82" y="494" font-size="18" font-weight="700" fill="#e0def4">AI Dev Tools</text>
  <text x="216" y="494" font-size="12.5" fill="#6e6a86" class="mono">vendor 横断で共有・ミラーされる agents / skills / hooks / MCP</text>
  <line x1="62" y1="510" x2="1176" y2="510" stroke="#403d52"/>

  <!-- Sub A: Claude Code (love) -->
  <rect x="64" y="526" width="357" height="104" rx="10" fill="#26233a" stroke="#403d52"/>
  <circle cx="84" cy="552" r="5" fill="#eb6f92"/>
  <text x="98" y="557" font-size="15" font-weight="700" fill="#e0def4">Claude Code</text>
  <g class="mono" fill="#908caa" font-size="12.5">
    <text x="84" y="584">14 agents · 21 commands</text>
    <text x="84" y="604">23 skills · 5 hooks</text>
    <text x="84" y="624">settings.json · statusline</text>
  </g>

  <!-- Sub B: Codex (foam) -->
  <rect x="441" y="526" width="357" height="104" rx="10" fill="#26233a" stroke="#403d52"/>
  <circle cx="461" cy="552" r="5" fill="#9ccfd8"/>
  <text x="475" y="557" font-size="15" font-weight="700" fill="#e0def4">Codex</text>
  <g class="mono" fill="#908caa" font-size="12.5">
    <text x="461" y="584">14 agents (.toml)</text>
    <text x="461" y="604">hooks · skills (.system)</text>
    <text x="461" y="624">AGENTS.md · config.toml</text>
  </g>

  <!-- Sub C: Gemini CLI (gold) -->
  <rect x="818" y="526" width="357" height="104" rx="10" fill="#26233a" stroke="#403d52"/>
  <circle cx="838" cy="552" r="5" fill="#f6c177"/>
  <text x="852" y="557" font-size="15" font-weight="700" fill="#e0def4">Gemini CLI</text>
  <g class="mono" fill="#908caa" font-size="12.5">
    <text x="838" y="584">GEMINI.md · settings.json</text>
    <text x="838" y="604">gemini‑consultant</text>
    <text x="838" y="624">MCP server (self‑built)</text>
  </g>

  <!-- shared notes -->
  <text x="64" y="662" font-size="12.5" fill="#6e6a86" class="mono">hooks:  auto‑format · lint · bash‑review · git‑push‑review · stop‑audit   (Claude ↔ Codex mirror)</text>
  <text x="64" y="686" font-size="12.5" fill="#6e6a86" class="mono">+ GitHub Copilot CLI  —  installed via install.sh · Neovim plugin · Copilot MCP</text>

</svg>
