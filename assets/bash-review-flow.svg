<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 940" width="1240" height="940" font-family="'Helvetica Neue', Arial, 'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <defs>
    <style>.mono { font-family: 'SF Mono', 'Menlo', 'Consolas', 'DejaVu Sans Mono', monospace; }</style>
  </defs>

  <rect x="0" y="0" width="1240" height="940" fill="#191724"/>
  <rect x="8" y="8" width="1224" height="924" rx="18" fill="none" stroke="#26233a" stroke-width="1.5"/>

  <!-- header -->
  <text x="42" y="70" font-size="32" font-weight="700" fill="#c4a7e7">bash‑review — 3層セーフティゲート</text>
  <text x="44" y="100" font-size="15" fill="#908caa">PreToolUse Bash フック · モデル合意でも高リスクは自動実行せず、誤ればフェイルセーフで ask</text>

  <!-- outcome legend (top-right) -->
  <g class="mono" font-size="12">
    <rect x="866" y="52" width="96" height="26" rx="13" fill="none" stroke="#31748f"/>
    <text x="914" y="69" text-anchor="middle" fill="#31748f" font-weight="700">ALLOW</text>
    <rect x="970" y="52" width="96" height="26" rx="13" fill="none" stroke="#f6c177"/>
    <text x="1018" y="69" text-anchor="middle" fill="#f6c177" font-weight="700">ASK</text>
    <rect x="1074" y="52" width="96" height="26" rx="13" fill="none" stroke="#eb6f92"/>
    <text x="1122" y="69" text-anchor="middle" fill="#eb6f92" font-weight="700">DENY</text>
  </g>

  <!-- input node -->
  <rect x="40" y="122" width="1160" height="44" rx="10" fill="#1f1d2e" stroke="#403d52"/>
  <text x="66" y="149" font-size="12.5" fill="#908caa" class="mono">IN · Bash command — &amp;&amp;/||/|/; と改行でサブコマンド分割</text>

  <text x="620" y="182" font-size="11" fill="#6e6a86" text-anchor="middle">▼ 該当なければ次の層へ</text>

  <!-- Tier 1: static DENY -->
  <rect x="40" y="188" width="1160" height="64" rx="12" fill="#1f1d2e" stroke="#403d52"/>
  <rect x="40" y="188" width="6" height="64" rx="3" fill="#eb6f92"/>
  <text x="66" y="214" font-size="15" font-weight="700" fill="#e0def4">① 静的 DENY （即拒否）</text>
  <text x="66" y="238" font-size="12.5" fill="#908caa" class="mono">sudo · doas · su · pkexec · curl · wget · nc · ssh · dd · shred · mkfs.* · rm -rf /|~|.</text>
  <text x="1034" y="225" font-size="14" fill="#eb6f92">→</text>
  <rect x="1058" y="207" width="96" height="26" rx="13" fill="none" stroke="#eb6f92"/>
  <text x="1106" y="224" font-size="12" text-anchor="middle" fill="#eb6f92" font-weight="700" class="mono">DENY</text>

  <text x="620" y="268" font-size="11" fill="#6e6a86" text-anchor="middle">▼ 該当なければ次の層へ</text>

  <!-- Tier 2: safe skip -->
  <rect x="40" y="274" width="1160" height="84" rx="12" fill="#1f1d2e" stroke="#403d52"/>
  <rect x="40" y="274" width="6" height="84" rx="3" fill="#31748f"/>
  <text x="66" y="300" font-size="15" font-weight="700" fill="#e0def4">② セーフスキップ （レビュー省略）</text>
  <text x="66" y="324" font-size="12.5" fill="#908caa" class="mono">ls · cat · pwd · echo · git status/log/diff · grep · rg · head · tail · which …</text>
  <text x="66" y="346" font-size="12" fill="#6e6a86" class="mono">除外: 機密パス(.env/.ssh/…) · ツリー外参照 · 危険 rg フラグ · 複雑シェル構文</text>
  <text x="1034" y="322" font-size="14" fill="#31748f">→</text>
  <rect x="1058" y="304" width="96" height="26" rx="13" fill="none" stroke="#31748f"/>
  <text x="1106" y="321" font-size="12" text-anchor="middle" fill="#31748f" font-weight="700" class="mono">ALLOW</text>

  <text x="620" y="374" font-size="11" fill="#6e6a86" text-anchor="middle">▼ 該当なければ次の層へ</text>

  <!-- Tier 3: high risk (parallel AND gate) -->
  <rect x="40" y="380" width="1160" height="180" rx="12" fill="#1f1d2e" stroke="#403d52"/>
  <rect x="40" y="380" width="6" height="180" rx="3" fill="#f6c177"/>
  <text x="66" y="406" font-size="15" font-weight="700" fill="#e0def4">③ 高リスク — Gemini ∥ Codex 並列 AND ゲート</text>
  <text x="66" y="430" font-size="12.5" fill="#908caa" class="mono">rm -r · git force push / reset --hard / clean -f · pkg install · npx/uvx · sh -c · eval · chmod -R · find -exec</text>
  <rect x="66" y="446" width="1068" height="42" rx="10" fill="#26233a" stroke="#403d52"/>
  <text x="86" y="472" font-size="12.5" fill="#e0def4" class="mono">Gemini (総合判定)　∥　Codex (敵対的レビュー)　— 並列実行、判定は自動許可には使わず人間判断用</text>
  <text x="66" y="522" font-size="13" class="mono"><tspan fill="#908caa">両者 ALLOW ⇒ </tspan><tspan fill="#31748f" font-weight="700">ALLOW</tspan><tspan fill="#6e6a86">　/　</tspan><tspan fill="#908caa">両者 DENY ⇒ </tspan><tspan fill="#eb6f92" font-weight="700">DENY</tspan><tspan fill="#6e6a86">　/　</tspan><tspan fill="#908caa">それ以外 (判定割れ/ASK/ERROR) ⇒ </tspan><tspan fill="#f6c177" font-weight="700">ASK</tspan></text>
  <text x="66" y="546" font-size="12" fill="#6e6a86" class="mono">片方だけ説得では通らない (OR ゲート化しない)。両判定を理由文に添えて ask へ</text>

  <text x="620" y="576" font-size="11" fill="#6e6a86" text-anchor="middle">▼ 高リスクでなければ (低リスク)</text>

  <!-- Tier 4: low risk (Gemini -> Codex) -->
  <rect x="40" y="582" width="1160" height="250" rx="12" fill="#1f1d2e" stroke="#403d52"/>
  <rect x="40" y="582" width="6" height="250" rx="3" fill="#c4a7e7"/>
  <text x="66" y="608" font-size="15" font-weight="700" fill="#e0def4">④ 低リスク — Gemini 一次審査</text>

  <text x="66" y="640" font-size="13" class="mono"><tspan fill="#908caa">Gemini = ALLOW　⇒　</tspan><tspan fill="#31748f" font-weight="700">ALLOW</tspan><tspan fill="#6e6a86">　(即許可)</tspan></text>
  <text x="66" y="666" font-size="13" class="mono"><tspan fill="#908caa">Gemini = ASK / DENY / ERROR　⇒　Codex 二次確認:</tspan></text>

  <!-- codex sub-branch rail -->
  <line x1="86" y1="678" x2="86" y2="800" stroke="#403d52"/>
  <g class="mono" font-size="13">
    <text x="100" y="692"><tspan fill="#908caa">Gemini DENY × Codex ALLOW　⇒　</tspan><tspan fill="#f6c177" font-weight="700">ASK</tspan><tspan fill="#6e6a86">　(自動上書き禁止)</tspan></text>
    <text x="100" y="718"><tspan fill="#908caa">Codex ALLOW (Gemini ASK/ERROR)　⇒　</tspan><tspan fill="#31748f" font-weight="700">ALLOW</tspan></text>
    <text x="100" y="744"><tspan fill="#908caa">Codex ASK　⇒　</tspan><tspan fill="#f6c177" font-weight="700">ASK</tspan></text>
    <text x="100" y="770"><tspan fill="#908caa">Codex DENY　⇒　</tspan><tspan fill="#eb6f92" font-weight="700">DENY</tspan></text>
    <text x="100" y="796"><tspan fill="#908caa">Codex ERROR　⇒　Gemini へフォールバック (DENY⇒</tspan><tspan fill="#eb6f92" font-weight="700">DENY</tspan><tspan fill="#908caa"> / ASK·ERROR⇒</tspan><tspan fill="#f6c177" font-weight="700">ASK</tspan><tspan fill="#908caa">)</tspan></text>
  </g>

  <!-- fail-safe band -->
  <rect x="40" y="846" width="1160" height="54" rx="12" fill="#1f1d2e" stroke="#403d52"/>
  <rect x="40" y="846" width="6" height="54" rx="3" fill="#908caa"/>
  <text x="66" y="869" font-size="12.5" fill="#908caa" class="mono">FAIL‑SAFE · 判定を出す前の例外 (stdin 破損等) は必ず ask に倒す · API/CLI 不在も ask へフェイルクローズ</text>
  <text x="66" y="889" font-size="12.5" fill="#6e6a86" class="mono">claude / codex 2 変種は _bash_review_common.py をバイト同一で共有し、test_hook_sync がドリフトを検知</text>

</svg>
