set-option -g default-shell /usr/bin/fish
## status bar
set-option -g status-bg "colour238"
set-option -g status-fg "colour255"
set-option -g status-left '#[fg=red,bg=colour238]#{?client_prefix,#[reverse],} #[default]'
### Key bind setting
## set prefix key
set -g prefix C-a
## remove default prefix key (C-b)
unbind C-b
## copy-mode
set-window-option -g mode-keys vi
### for Ubuntu
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xsel -ip && xsel -op | xsel -ib"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xsel -ip && xsel -op | xsel -ib"
bind ] run 'tmux set-buffer -- "$(xsel -b)"; tmux paste-buffer'
### for Mac
#bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
#bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
#bind ] run 'tmux set-buffer -- "$(pbpaste)"; tmux paste-buffer'
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi escape send-keys -X clear-selection

# set-option -g mouse on

### pane
## move pane
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

### logging
# C-b C-p Start logging.
bind C-p pipe-pane -o '/bin/sh -c "while read -r LINE; do echo \"[\$(date +\"%%Y_%%m%%d_%%H%%M%%S_%%N\")] \${LINE}\" >> \${HOME}/.tmux/log/\$(date +%Y%m%d-%H%M%S)-#S-#I.#P.log; done "' \; display-message "Logging start."
# C-b C-o Stop logging
bind C-o pipe-pane \; display-message "Logging end."
# C-b v Open new window. Logging always. (-n is set window name.)
#bind v new-window -n 'logging...' \; pipe-pane -o '/bin/sh -c "while read -r LINE; do echo \"[\$(date +\"%%Y_%%m%%d_%%H%%M%%S_%%N\")] \${LINE}\" >> \${HOME}/.tmux/log/\$(date +%Y%m%d-%H%M%S)-#S-#I.#P.log; done "'

# create new window with current directory
bind c new-window -c "#{pane_current_path}"
